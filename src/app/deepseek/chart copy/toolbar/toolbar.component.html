<div class="drawing-toolbar">
  <div class="tool-group">
    <button 
      class="tool-button" 
      [class.active]="activeTool === 'trendline'"
      (click)="selectTool('trendline')"
      title="Draw Trend Line">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="3" x2="21" y2="21" />
        <circle cx="3" cy="3" r="1.5" fill="currentColor"/>
        <circle cx="21" cy="21" r="1.5" fill="currentColor"/>
      </svg>
      <span>Line</span>
    </button>
    <button 
      class="tool-button" 
      [class.active]="activeTool === 'select'"
      (click)="selectTool('select')"
      title="Select/Move Line">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="12" r="1" />
        <circle cx="15" cy="12" r="1" />
        <path d="M4 12h16" />
      </svg>
      <span>Select</span>
    </button>
    <button 
      class="tool-button" 
      [class.active]="activeTool === 'delete'"
      (click)="selectTool('delete')"
      title="Delete Selected Line">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
      </svg>
      <span>Delete</span>
    </button>
  </div>
</div>
